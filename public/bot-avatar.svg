<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Gradient background -->
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#4f1d96"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="40%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </radialGradient>
    <radialGradient id="eyeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <circle cx="32" cy="32" r="29" stroke="#a78bfa" stroke-width="0.8" stroke-opacity="0.35" fill="none"/>

  <!-- Head / face plate -->
  <rect x="14" y="17" width="36" height="30" rx="10" fill="url(#faceGrad)" stroke="#c4b5fd" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Antenna stem -->
  <line x1="32" y1="17" x2="32" y2="10" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
  <!-- Antenna ball with glow -->
  <circle cx="32" cy="8.5" r="3" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="32" cy="8.5" r="1.5" fill="#fff" opacity="0.7"/>

  <!-- Ear nubs -->
  <rect x="10" y="26" width="4" height="8" rx="2" fill="#a78bfa" stroke="#c4b5fd" stroke-width="0.6"/>
  <rect x="50" y="26" width="4" height="8" rx="2" fill="#a78bfa" stroke="#c4b5fd" stroke-width="0.6"/>

  <!-- Eye sockets (dark recesses) -->
  <rect x="18" y="24" width="11" height="9" rx="3.5" fill="#2e1065"/>
  <rect x="35" y="24" width="11" height="9" rx="3.5" fill="#2e1065"/>

  <!-- Eyes (glowing amber) -->
  <rect x="19.5" y="25.5" width="8" height="6" rx="2.5" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <rect x="36.5" y="25.5" width="8" height="6" rx="2.5" fill="url(#eyeGlow)" filter="url(#glow)"/>
  <!-- Eye shine -->
  <circle cx="21.5" cy="27" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="38.5" cy="27" r="1" fill="#fff" opacity="0.8"/>

  <!-- Nose dot -->
  <circle cx="32" cy="35" r="1.2" fill="#c4b5fd" opacity="0.7"/>

  <!-- Mouth — friendly arc -->
  <path d="M 23 39.5 Q 32 44.5 41 39.5" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" fill="none" filter="url(#glow)"/>

  <!-- Chin panel screws -->
  <circle cx="20" cy="43" r="1" fill="#4f1d96" stroke="#a78bfa" stroke-width="0.5"/>
  <circle cx="44" cy="43" r="1" fill="#4f1d96" stroke="#a78bfa" stroke-width="0.5"/>

  <!-- Cricket bat silhouette (tiny, bottom-right) -->
  <rect x="44" y="48" width="3" height="9" rx="1" fill="#fbbf24" transform="rotate(-30 45 52)" opacity="0.85"/>
  <rect x="43" y="55" width="5" height="2" rx="0.8" fill="#c4b5fd" transform="rotate(-30 45 56)" opacity="0.75"/>
</svg>
