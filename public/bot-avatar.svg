<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#F59E0B"/>

  <!-- Cricket ball seam lines -->
  <circle cx="32" cy="32" r="18" fill="#dc2626" stroke="#991b1b" stroke-width="1.5"/>
  <!-- Curved seam top -->
  <path d="M 20 24 Q 32 16 44 24" stroke="#fca5a5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Curved seam bottom -->
  <path d="M 20 40 Q 32 48 44 40" stroke="#fca5a5" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Vertical seam -->
  <path d="M 32 14 Q 28 32 32 50" stroke="#fca5a5" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Robot eyes -->
  <rect x="24" y="27" width="6" height="5" rx="1.5" fill="#fff" opacity="0.95"/>
  <rect x="34" y="27" width="6" height="5" rx="1.5" fill="#fff" opacity="0.95"/>
  <circle cx="27" cy="29.5" r="1.5" fill="#1e40af"/>
  <circle cx="37" cy="29.5" r="1.5" fill="#1e40af"/>

  <!-- Robot mouth -->
  <rect x="25" y="35" width="14" height="3" rx="1.5" fill="#fff" opacity="0.85"/>
  <line x1="29" y1="35" x2="29" y2="38" stroke="#dc2626" stroke-width="1"/>
  <line x1="33" y1="35" x2="33" y2="38" stroke="#dc2626" stroke-width="1"/>
  <line x1="35" y1="35" x2="35" y2="38" stroke="#dc2626" stroke-width="1"/>

  <!-- Antenna -->
  <line x1="32" y1="14" x2="32" y2="10" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="9" r="2.5" fill="#fbbf24"/>
</svg>
